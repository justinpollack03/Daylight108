<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daylight 108</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Libre+Baskerville&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F8F4ED;
      --ink: #1A1610;
      --gold: #B8943A;
      --coffee-bg: #2C1F14;
      --coffee-accent: #C4855A;
      --bar-bg: #F8F4ED;
      --bar-accent: #B8943A;
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* ── SPLIT LAYOUT ── */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      position: relative;
    }

    .panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      overflow: hidden;
      cursor: pointer;
      transition: flex 0.6s cubic-bezier(0.77, 0, 0.18, 1);
    }

    .split:has(.panel-coffee:hover) .panel-coffee { flex: 1.35; }
    .split:has(.panel-coffee:hover) .panel-bar    { flex: 0.65; }
    .split:has(.panel-bar:hover)    .panel-bar    { flex: 1.35; }
    .split:has(.panel-bar:hover)    .panel-coffee { flex: 0.65; }

    /* ── COFFEE PANEL ── */
    .panel-coffee {
      background-color: #2C1F14;
    }

    .panel-coffee::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 30% 60%, rgba(196,133,90,0.18) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: cover, 300px 300px;
      pointer-events: none;
    }

    /* Wood grain lines */
    .panel-coffee::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        168deg,
        transparent,
        transparent 40px,
        rgba(196,133,90,0.04) 40px,
        rgba(196,133,90,0.04) 41px
      );
      pointer-events: none;
    }

    /* ── BAR PANEL ── */
    .panel-bar {
      background-color: #F8F4ED;
    }

    .panel-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 70% 40%, rgba(184,148,58,0.12) 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: cover, 200px 200px;
      pointer-events: none;
    }

    /* ── DIVIDER ── */
    .divider {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      pointer-events: none;
    }

    .divider-line {
      width: 1px;
      height: 120px;
      background: linear-gradient(to bottom, transparent, rgba(184,148,58,0.5), transparent);
    }

    .divider-logo {
      background: var(--cream);
      border: 1px solid rgba(184,148,58,0.4);
      padding: 1.25rem 1.75rem;
      text-align: center;
    }

    .divider-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #1A1610;
      line-height: 1;
      letter-spacing: 0.01em;
    }

    .divider-name em {
      font-style: italic;
      color: var(--gold);
    }

    .divider-sub {
      font-family: 'Libre Baskerville', serif;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #B8943A;
      margin-top: 0.4rem;
    }

    /* ── PANEL CONTENT ── */
    .panel-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .panel-eyebrow {
      font-family: 'Libre Baskerville', serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .panel:hover .panel-eyebrow { opacity: 1; }

    .panel-coffee .panel-eyebrow { color: #C4855A; }
    .panel-bar    .panel-eyebrow { color: #B8943A; }

    .panel-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .panel-coffee .panel-heading { color: #F2E8DC; }
    .panel-bar    .panel-heading { color: #1A1610; }

    .panel-heading em {
      display: block;
      font-style: italic;
    }

    .panel-coffee .panel-heading em { color: #C4855A; }
    .panel-bar    .panel-heading em { color: #B8943A; }

    .panel-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-top: 1rem;
      max-width: 220px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s 0.05s, transform 0.35s 0.05s;
    }

    .panel:hover .panel-desc {
      opacity: 1;
      transform: translateY(0);
    }

    .panel-coffee .panel-desc { color: rgba(242,232,220,0.75); }
    .panel-bar    .panel-desc { color: #3D3528; }

    .panel-cta {
      display: inline-block;
      margin-top: 1.75rem;
      font-family: 'Libre Baskerville', serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      border: 1px solid;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s 0.1s, transform 0.35s 0.1s, background 0.2s;
    }

    .panel:hover .panel-cta {
      opacity: 1;
      transform: translateY(0);
    }

    .panel-coffee .panel-cta {
      color: #C4855A;
      border-color: rgba(196,133,90,0.5);
    }
    .panel-coffee .panel-cta:hover {
      background: rgba(196,133,90,0.12);
    }
    .panel-bar .panel-cta {
      color: #B8943A;
      border-color: rgba(184,148,58,0.5);
    }
    .panel-bar .panel-cta:hover {
      background: rgba(184,148,58,0.1);
    }

    /* ── CORNER LABEL ── */
    .corner-label {
      position: absolute;
      bottom: 2.5rem;
      font-family: 'Libre Baskerville', serif;
      font-size: 8.5px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .panel:hover .corner-label { opacity: 0.6; }
    .panel-coffee .corner-label { color: #C4855A; right: 2.5rem; }
    .panel-bar    .corner-label { color: #B8943A; left: 2.5rem; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-coffee .panel-content { animation: fadeUp 0.8s 0.1s ease both; }
    .panel-bar    .panel-content { animation: fadeUp 0.8s 0.2s ease both; }
    .divider                     { animation: fadeUp 0.8s 0.3s ease both; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      html, body { overflow: auto; }
      .split {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
        height: auto;
        min-height: 100vh;
      }
      .panel { min-height: 50vh; }
      .split:has(.panel-coffee:hover) .panel-coffee,
      .split:has(.panel-coffee:hover) .panel-bar,
      .split:has(.panel-bar:hover) .panel-bar,
      .split:has(.panel-bar:hover) .panel-coffee { flex: 1; }
      .divider { display: none; }
      .panel-desc, .panel-cta { opacity: 1; transform: none; }
      .corner-label { opacity: 0.5; }
    }
  </style>
</head>
<body>

<div class="split">

  <!-- COFFEE -->
  <a class="panel panel-coffee" href="coffee.html">
    <div class="panel-content">
      <p class="panel-eyebrow">Gaggia Classic Pro</p>
      <h2 class="panel-heading">
        Morning
        <em>Coffee</em>
      </h2>
      <p class="panel-desc">Espresso drinks, pour overs & everything in between</p>
      <span class="panel-cta">View Menu</span>
    </div>
    <span class="corner-label">Coffee Menu</span>
  </a>

  <!-- DIVIDER LOGO -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-logo">
      <p class="divider-name">Daylight <em>108</em></p>
      <p class="divider-sub">A private residence</p>
    </div>
    <div class="divider-line"></div>
  </div>

  <!-- BAR -->
  <a class="panel panel-bar" href="bar.html">
    <div class="panel-content">
      <p class="panel-eyebrow">Handcrafted Cocktails</p>
      <h2 class="panel-heading">
        Evening
        <em>Bar</em>
      </h2>
      <p class="panel-desc">Cocktails, spirits, beer & wine — made to order</p>
      <span class="panel-cta">View Menu</span>
    </div>
    <span class="corner-label">Bar Menu</span>
  </a>

</div>

</body>
</html>
